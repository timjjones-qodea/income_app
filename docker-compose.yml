services:
  retirement-income:
    image: retirement-income:latest
    build:
      context: .
    container_name: retirement-income-dev
    restart: unless-stopped
    environment:
      RIE_DATA_DIR: /app/data
    ports:
      - "${RIE_PORT:-8010}:8000"
    volumes:
      - ./.data/dev:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
